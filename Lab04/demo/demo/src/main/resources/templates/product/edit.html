<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa sản phẩm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            padding: 50px 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 24px;
            color: #065f46;
            text-align: center;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .current-image {
            margin-bottom: 15px;
        }

        .current-image img {
            width: 110px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">

            <h1>✏️ Chỉnh sửa sản phẩm</h1>

            <form th:action="@{/products/update}" th:object="${product}" method="post" enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" th:field="*{name}" placeholder="Nhập tên sản phẩm">
                </div>

                <div class="form-group">
                    <label>Giá (VNĐ)</label>
                    <input type="number" th:field="*{price}" placeholder="Nhập giá sản phẩm">
                </div>

                <div class="form-group">
                    <label>Danh mục</label>
                    <select name="category_id">
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                            th:selected="${product.category?.id == cat.id}">
                        </option>
                    </select>
                </div>

                <div class="form-group current-image" th:if="${product.image != null}">
                    <label>Hình ảnh hiện tại</label>
                    <img th:src="@{/images/{img}(img=${product.image})}">
                </div>

                <div class="form-group">
                    <label>Hình ảnh mới (không bắt buộc)</label>
                    <input type="file" name="imageProduct" accept="image/*">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        💾 Cập nhật
                    </button>

                    <a href="/products" class="btn btn-secondary">
                        ↩ Quay lại
                    </a>
                </div>

            </form>

        </div>
    </div>
</body>

</html>
