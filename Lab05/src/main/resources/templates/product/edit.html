<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div layout:fragment="content" class="container py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Edit Product</h2>
            <a th:href="@{/products}" class="btn btn-outline-secondary">
                &larr; Back to List
            </a>
        </div>

        <!-- Card -->
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">

                <form th:action="@{/products/save}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Name</label>
                        <input class="form-control" type="text" th:field="*{name}" id="name"
                            placeholder="Enter product name">
                    </div>

                    <div class="mb-3">
                        <label for="image" class="form-label fw-semibold">Image URL</label>
                        <input class="form-control" type="text" th:field="*{image}" id="image"
                            placeholder="https://example.com/image.jpg">
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label fw-semibold">Price</label>
                        <input class="form-control" type="number" th:field="*{price}" id="price"
                            placeholder="Enter price">
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label fw-semibold">Category</label>
                        <select name="categoryId" class="form-select" id="category">
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${product.category != null and cat.id == product.category.id}">
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            Update Product
                        </button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>

            </div>
        </div>

    </div>

</body>

</html>
