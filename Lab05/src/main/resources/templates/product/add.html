<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div layout:fragment="content" class="container py-5">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-header bg-success text-white rounded-top-4">
                        <h4 class="mb-0">
                            <i class="bi bi-plus-circle"></i> Add New Product
                        </h4>
                    </div>

                    <div class="card-body p-4">

                        <form th:action="@{/products/save}" th:object="${product}" method="post">

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product Name</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-box"></i>
                                    </span>
                                    <input type="text" th:field="*{name}" class="form-control"
                                        placeholder="Enter product name">
                                </div>
                            </div>

                            <!-- Image -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Image URL</label>
                                <input type="text" th:field="*{image}" id="imageInput" class="form-control"
                                    placeholder="https://example.com/image.jpg">

                                <!-- Preview -->
                                <div class="text-center mt-3">
                                    <img id="previewImage" style="max-height:150px;border-radius:10px;display:none;">
                                </div>
                            </div>

                            <!-- Price -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Price</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-currency-dollar"></i>
                                    </span>
                                    <input type="number" th:field="*{price}" class="form-control"
                                        placeholder="Enter price">
                                </div>
                            </div>

                            <!-- Category -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Category</label>
                                <select name="categoryId" class="form-select">
                                    <option value="">-- Select Category --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                                    </option>
                                </select>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/products}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancel
                                </a>

                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle"></i> Add Product
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        document.getElementById("imageInput").addEventListener("input", function () {
            const url = this.value;
            const preview = document.getElementById("previewImage");

            if (url) {
                preview.src = url;
                preview.style.display = "block";
            } else {
                preview.style.display = "none";
            }
        });
    </script>

</body>

</html>
