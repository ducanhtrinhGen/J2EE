<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div layout:fragment="content" class="container py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Product Management</h2>

            <a th:href="@{/products/add}" class="btn btn-success">
                + Create New Product
            </a>
        </div>

        <!-- Card -->
        <div class="card shadow-lg border-0">
            <div class="card-body">

                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Image</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}" class="fw-bold"></td>

                            <td th:text="${product.name}"></td>

                            <td>
                                <img th:src="${product.image}" alt="Product Image"
                                    style="height:100px;width:120px;object-fit:cover;border-radius:8px;">
                            </td>

                            <td>
                                <span class="badge bg-primary fs-6" th:text="${product.price}">
                                </span>
                            </td>

                            <td th:text="${product.category != null} ? ${product.category.name} : 'No Category'"></td>

                            <td class="text-center">

                                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">
                                    Edit
                                </a>

                                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure to delete this product?')">
                                    Delete
                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>
        </div>

    </div>

</body>

</html>
