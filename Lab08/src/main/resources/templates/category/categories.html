<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/product-style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="logo">ShopPro</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link">
                <i class="fas fa-home nav-icon"></i>
                <span>Home</span>
            </a>
            <a href="/products" class="nav-link">
                <i class="fas fa-boxes nav-icon"></i>
                <span>Products</span>
            </a>
            <a href="/categories" class="nav-link active">
                <i class="fas fa-tags nav-icon"></i>
                <span>Categories</span>
            </a>
            <a href="/cart" class="nav-link">
                <i class="fas fa-cart-shopping nav-icon"></i>
                <span>Cart</span>
                <span th:if="${cartItemCount > 0}" class="nav-badge" th:text="${cartItemCount}">0</span>
            </a>
        </nav>
        <div class="user-section">
            <div class="user-avatar" th:text="${#authentication.name?.substring(0,1)?.toUpperCase()}"></div>
            <div style="text-align: center; margin-bottom: 15px;">
                <div th:text="${#authentication.name}" style="font-weight: 600; margin-bottom: 5px;"></div>
                <div style="color: #a0a0a0; font-size: 13px;">Administrator</div>
            </div>
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="nav-link" style="width: 100%; justify-content: center; border-left: none;">
                    <i class="fas fa-sign-out-alt nav-icon"></i>
                    <span>Logout</span>
                </button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="header">
                <div>
                    <div class="page-title">Category Management</div>
                    <div class="page-subtitle">Create categories to use in product filtering and forms.</div>
                </div>
                <a href="/products" class="btn-secondary" style="text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Back to Products
                </a>
            </div>

            <div th:if="${categorySuccess}" class="alert-success" style="margin-bottom: 20px;">
                <i class="fas fa-circle-check"></i>
                <span th:text="${categorySuccess}">Success</span>
            </div>

            <div class="form-card" style="max-width: 100%; margin-bottom: 24px;">
                <form th:action="@{/categories/create}" th:object="${category}" method="post">
                    <div class="form-group">
                        <label class="form-label">Category name</label>
                        <input type="text" th:field="*{name}" class="form-input" placeholder="Enter category name" required>
                        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></span>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-plus"></i> Create Category
                    </button>
                </form>
            </div>

            <div class="form-card" style="max-width: 100%;">
                <h3 style="margin-bottom: 16px;">Current Categories</h3>
                <div th:if="${#lists.isEmpty(categories)}" class="empty-state" style="padding: 40px 20px;">
                    <div class="empty-icon">#</div>
                    <p>No category yet.</p>
                </div>
                <div th:unless="${#lists.isEmpty(categories)}" style="display: grid; gap: 12px;">
                    <div th:each="cat : ${categories}" style="padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.03);">
                        <strong th:text="${cat.name}">Category</strong>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
